<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Copa 2026 | Tabela Interativa - Cores do Brasil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #009c3b 0%, #002776 100%);
            min-height: 100vh;
            padding: 25px 20px;
        }

        /* container principal com efeito bandeira */
        .main-card {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            border: 2px solid #FFCC29;
        }

        /* header com faixas */
        .hero {
            background: linear-gradient(135deg, #002776 0%, #009c3b 100%);
            padding: 20px 30px 15px;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFCC29, #FFF3B0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
        }

        .hero p {
            color: #FFE6A3;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .badge-br {
            background: #FFCC29;
            color: #002776;
            border-radius: 60px;
            padding: 4px 16px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* abas estilo moderna */
        .tabs-container {
            background: #fef7e0;
            padding: 0 25px;
            border-bottom: 3px solid #FFCC29;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            list-style: none;
            padding: 12px 0 0;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px 40px 0 0;
            cursor: pointer;
            transition: 0.2s;
            color: #1f3a2b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn i {
            font-style: normal;
            font-size: 1.2rem;
        }

        .tab-btn:hover {
            background: #ffefb9;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #FFCC29;
            color: #002776;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
            border-radius: 30px 30px 0 0;
        }

        /* painel de conteúdo */
        .panels {
            background: #ffffff;
            padding: 28px 24px 32px;
            border-radius: 0 0 40px 40px;
        }

        .tab-pane {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .tab-pane.active-pane {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* controles e status */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 28px;
            background: #f2f2e9;
            padding: 12px 20px;
            border-radius: 60px;
        }

        .btn-atualizar {
            background: #009c3b;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .btn-atualizar:hover {
            background: #007a2e;
            transform: scale(1.02);
        }

        .auto-toggle {
            background: #002776;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .status-msg {
            background: #e9ecef;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: monospace;
            color: #1e3a2f;
        }

        /* grupos: grid */
        .grupos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .card-grupo {
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #ffe2a4;
            transition: 0.1s;
        }

        .card-grupo .header-grupo {
            background: linear-gradient(95deg, #FFCC29, #FFEAA0);
            padding: 12px 18px;
            font-weight: 800;
            font-size: 1.5rem;
            color: #002776;
        }

        .tabela-jogos {
            width: 100%;
            border-collapse: collapse;
        }

        .tabela-jogos td, .tabela-jogos th {
            padding: 10px 8px;
            border-bottom: 1px solid #efefdf;
            text-align: center;
        }

        .equipe-nome {
            text-align: left;
            font-weight: 500;
        }

        .placar-cell {
            font-weight: 800;
            font-family: monospace;
            background: #f9f3e0;
            border-radius: 30px;
            display: inline-block;
            padding: 4px 12px;
            min-width: 70px;
        }

        /* mata-mata cards */
        .knockout-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: flex-start;
            margin-top: 15px;
        }

        .match-card {
            background: #fef9ef;
            border-radius: 28px;
            width: 280px;
            padding: 15px 12px;
            border-left: 7px solid #FFCC29;
            transition: 0.1s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .vs-circle {
            background: #002776;
            color: white;
            border-radius: 60px;
            padding: 4px 12px;
            font-size: 0.7rem;
        }

        .match-result {
            text-align: center;
            background: #e9e2cf;
            border-radius: 40px;
            padding: 6px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .final-card {
            border-left-color: #daa520;
            background: linear-gradient(145deg, #fff6e0, #fff0d0);
            width: 320px;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 20px 20px 12px;
            color: #3b3b2e;
            border-top: 1px solid #ffdd99;
            margin-top: 20px;
        }

        @media (max-width: 700px) {
            .hero h1 { font-size: 1.8rem; }
            .tab-btn { padding: 8px 14px; font-size: 0.8rem;}
            .match-card { width: 100%;}
        }
    </style>
</head>
<body>
<div class="main-card">
    <div class="hero">
        <h1>🇧🇷 COPA DO MUNDO 2026 🇧🇷</h1>
        <p><span class="badge-br">VERDE • AMARELO • AZUL • BRANCO</span> Placar automático via GE.globo.com</p>
    </div>
    <div class="tabs-container">
        <ul class="tabs">
            <li><button class="tab-btn active" data-tab="grupos">📋 GRUPOS (48 times)</button></li>
            <li><button class="tab-btn" data-tab="r32">⚡ 32 AVOS</button></li>
            <li><button class="tab-btn" data-tab="oitavas">🏹 OITAVAS</button></li>
            <li><button class="tab-btn" data-tab="quartas">🔱 QUARTAS</button></li>
            <li><button class="tab-btn" data-tab="semi">✨ SEMIFINAIS</button></li>
            <li><button class="tab-btn" data-tab="final">🏆 FINAL</button></li>
        </ul>
    </div>
    <div class="panels">
        <div class="action-bar">
            <button id="btnRefresh" class="btn-atualizar">🔄 BUSCAR PLACARES AGORA</button>
            <button id="btnAuto" class="auto-toggle">⏱️ AUTO (ON)</button>
            <div id="statusMsg" class="status-msg">✅ Pronto. Buscando resultados...</div>
        </div>

        <!-- PAINEL GRUPOS -->
        <div id="painel-grupos" class="tab-pane active-pane">
            <div id="gruposContainer" class="grupos-grid"></div>
        </div>
        <!-- PAINEL 32 AVOS -->
        <div id="painel-r32" class="tab-pane"><div id="rodada32" class="knockout-wrapper"></div></div>
        <!-- OITAVAS -->
        <div id="painel-oitavas" class="tab-pane"><div id="oitavas" class="knockout-wrapper"></div></div>
        <!-- QUARTAS -->
        <div id="painel-quartas" class="tab-pane"><div id="quartas" class="knockout-wrapper"></div></div>
        <!-- SEMI -->
        <div id="painel-semi" class="tab-pane"><div id="semifinais" class="knockout-wrapper"></div></div>
        <!-- FINAL -->
        <div id="painel-final" class="tab-pane"><div id="final" class="knockout-wrapper"></div></div>
        <footer>🏅 Resultados sincronizados com ge.globo.com (atualização a cada 55s) | Chaveamento baseado na classificação em tempo real</footer>
    </div>
</div>

<script>
    // ----------------------------------------------
    // 1. ESTRUTURA DOS GRUPOS (12 grupos / 48 seleções)
    // ----------------------------------------------
    const gruposData = {
        'A': ['Brasil', 'Sérvia', 'Camarões', 'Arábia Saudita'],
        'B': ['Alemanha', 'Croácia', 'Austrália', 'Costa Rica'],
        'C': ['Argentina', 'Polônia', 'Nigéria', 'Japão'],
        'D': ['França', 'Dinamarca', 'Tunísia', 'Panamá'],
        'E': ['Espanha', 'Holanda', 'Chile', 'Marrocos'],
        'F': ['Inglaterra', 'Estados Unidos', 'Senegal', 'Irã'],
        'G': ['Bélgica', 'Uruguai', 'Coreia do Sul', 'Canadá'],
        'H': ['Portugal', 'Suíça', 'Gana', 'Arábia Saudita'],
        'I': ['Itália', 'México', 'Peru', 'Nova Zelândia'],
        'J': ['Colômbia', 'Suécia', 'Egito', 'Uzbequistão'],
        'K': ['Costa do Marfim', 'Países Baixos', 'Escócia', 'Paraguai'],
        'L': ['Equador', 'País de Gales', 'Argélia', 'Jordânia']
    };

    function gerarJogosGrupo(selecoes) {
        return [
            { casa: selecoes[0], fora: selecoes[1] },
            { casa: selecoes[2], fora: selecoes[3] },
            { casa: selecoes[1], fora: selecoes[2] },
            { casa: selecoes[0], fora: selecoes[3] },
            { casa: selecoes[2], fora: selecoes[0] },
            { casa: selecoes[3], fora: selecoes[1] }
        ];
    }

    // Armazenamento de resultados
    let scoresStorage = {};
    function initScores() {
        for (let g in gruposData) {
            if (!scoresStorage[g]) scoresStorage[g] = [];
            const jogos = gerarJogosGrupo(gruposData[g]);
            for (let i=0; i<jogos.length; i++) {
                if (!scoresStorage[g][i]) scoresStorage[g][i] = { casa: null, fora: null };
            }
        }
    }
    initScores();

    // Render grupos
    function renderGrupos() {
        const container = document.getElementById('gruposContainer');
        if (!container) return;
        container.innerHTML = '';
        for (let letra in gruposData) {
            const times = gruposData[letra];
            const jogos = gerarJogosGrupo(times);
            const card = document.createElement('div');
            card.className = 'card-grupo';
            card.innerHTML = `
                <div class="header-grupo">GRUPO ${letra}</div>
                <table class="tabela-jogos">
                    <tbody id="grupo-${letra}-body"></tbody>
                </table>
            `;
            container.appendChild(card);
            const tbody = card.querySelector(`#grupo-${letra}-body`);
            for (let idx=0; idx<jogos.length; idx++) {
                const j = jogos[idx];
                const score = scoresStorage[letra][idx];
                const placarTxt = (score.casa !== null && score.fora !== null) ? `${score.casa} – ${score.fora}` : '— : —';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="equipe-nome">${j.casa}</td>
                    <td><span class="placar-cell">${placarTxt}</span></td>
                    <td class="equipe-nome">${j.fora}</td>
                `;
                tbody.appendChild(tr);
            }
        }
    }

    function updateGrupoUI(grupo, jogoIdx, casaGols, foraGols) {
        const tbody = document.querySelector(`#grupo-${grupo}-body`);
        if (!tbody) return;
        const rows = tbody.querySelectorAll('tr');
        if (rows[jogoIdx]) {
            const span = rows[jogoIdx].querySelector('.placar-cell');
            if (span) span.innerText = `${casaGols} – ${foraGols}`;
        }
    }

    // ----------------------------------------------
    // 2. FETCH REAL (ge.globo.com via proxy allorigins)
    // ----------------------------------------------
    const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
    const GE_URL = 'https://ge.globo.com/futebol/copa-do-mundo/';

    async function fetchPlacaresGE() {
        try {
            const response = await fetch(CORS_PROXY + encodeURIComponent(GE_URL), { signal: AbortSignal.timeout(13000) });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const html = await response.text();
            const regex = /([A-Za-zÀ-ú\s]+?)\s+(\d+)\s*[xX]\s*(\d+)\s+([A-Za-zÀ-ú\s]+?)(?:\s*[–\-—]|\.|\n|,|<|$)/g;
            let match;
            const resultados = [];
            while ((match = regex.exec(html)) !== null) {
                let time1 = match[1].trim(), g1 = parseInt(match[2]), g2 = parseInt(match[3]), time2 = match[4].trim();
                if (time1 && time2 && !isNaN(g1) && !isNaN(g2)) resultados.push({ timeA: time1, timeB: time2, golsA: g1, golsB: g2 });
            }
            let alterados = 0;
            for (let grupo in gruposData) {
                const times = gruposData[grupo];
                const jogos = gerarJogosGrupo(times);
                for (let idx = 0; idx < jogos.length; idx++) {
                    const j = jogos[idx];
                    const encontrado = resultados.find(r => (r.timeA === j.casa && r.timeB === j.fora) || (r.timeA === j.fora && r.timeB === j.casa));
                    if (encontrado) {
                        let casaG = encontrado.golsA, foraG = encontrado.golsB;
                        if (encontrado.timeA !== j.casa) { casaG = encontrado.golsB; foraG = encontrado.golsA; }
                        const atual = scoresStorage[grupo][idx];
                        if (atual.casa !== casaG || atual.fora !== foraG) {
                            scoresStorage[grupo][idx] = { casa: casaG, fora: foraG };
                            updateGrupoUI(grupo, idx, casaG, foraG);
                            alterados++;
                        }
                    }
                }
            }
            return { ok: true, alterados };
        } catch (err) {
            console.warn("Erro ge.globo:", err);
            return { ok: false, erro: err.message };
        }
    }

    // ----------------------------------------------
    // 3. Lógica da fase eliminatória baseada nos resultados dos grupos
    // ----------------------------------------------
    function calcularClassificacaoGrupo(grupo) {
        const times = gruposData[grupo];
        const jogos = gerarJogosGrupo(times);
        let pontos = {};
        times.forEach(t => pontos[t] = { pts: 0, gp: 0, gc: 0 });
        for (let i=0; i<jogos.length; i++) {
            const j = jogos[i];
            const score = scoresStorage[grupo][i];
            if (score.casa !== null && score.fora !== null) {
                const gc = score.casa, gf = score.fora;
                pontos[j.casa].gp += gc; pontos[j.casa].gc += gf;
                pontos[j.fora].gp += gf; pontos[j.fora].gc += gc;
                if (gc > gf) pontos[j.casa].pts += 3;
                else if (gf > gc) pontos[j.fora].pts += 3;
                else { pontos[j.casa].pts += 1; pontos[j.fora].pts += 1; }
            }
        }
        const ranking = times.map(t => ({ time: t, pts: pontos[t].pts, sg: pontos[t].gp - pontos[t].gc, gp: pontos[t].gp }));
        ranking.sort((a,b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);
        return ranking.map(r => r.time);
    }

    // obter 32 classificados (1º e 2º de cada grupo + 8 melhores 3º)
    function obterClassificados32() {
        let todos = [];
        for (let g in gruposData) {
            const ordem = calcularClassificacaoGrupo(g);
            todos.push({ grupo: g, pos:1, time: ordem[0] });
            todos.push({ grupo: g, pos:2, time: ordem[1] });
            todos.push({ grupo: g, pos:3, time: ordem[2] });
        }
        const terceiros = todos.filter(t => t.pos === 3);
        terceiros.sort((a,b) => (pontosSimulados(a.time) - pontosSimulados(b.time)) * -1);
        const melhoresTerceiros = terceiros.slice(0,8);
        const classificados = [...todos.filter(t => t.pos <=2), ...melhoresTerceiros];
        return classificados.slice(0,32).map(c => c.time);
    }

    function pontosSimulados(time) {
        let pts = 0;
        for (let g in gruposData) {
            const ordem = calcularClassificacaoGrupo(g);
            if (ordem.includes(time)) {
                const idx = ordem.indexOf(time);
                if (idx === 0) pts += 6;
                else if (idx === 1) pts += 4;
                else pts += 2;
            }
        }
        return pts;
    }

    // gerar mata-mata
    let mataMata = { r32: [], oitavas: [], quartas: [], semi: [], final: null };

    function gerarChaveCompleta() {
        const times32 = obterClassificados32();
        const r32 = [];
        for (let i=0; i<times32.length; i+=2) {
            if (times32[i] && times32[i+1]) r32.push({ timeA: times32[i], timeB: times32[i+1], resultado: null });
        }
        return r32;
    }

    function simularVencedor(timeA, timeB) {
        let totalA = 0, totalB = 0;
        for (let g in scoresStorage) {
            for (let j of scoresStorage[g]) {
                if (j.casa !== null && j.fora !== null) {
                    if (j.casa === timeA || j.fora === timeA) totalA += (j.casa === timeA ? j.casa : j.fora);
                    if (j.casa === timeB || j.fora === timeB) totalB += (j.casa === timeB ? j.casa : j.fora);
                }
            }
        }
        return (totalA >= totalB) ? timeA : timeB;
    }

    function avancarFases() {
        let atual32 = mataMata.r32;
        let oitavas = [];
        for (let i=0; i<atual32.length; i+=2) {
            if (atual32[i] && atual32[i+1]) {
                const v1 = simularVencedor(atual32[i].timeA, atual32[i].timeB);
                const v2 = simularVencedor(atual32[i+1].timeA, atual32[i+1].timeB);
                oitavas.push({ timeA: v1, timeB: v2, resultado: null });
            }
        }
        mataMata.oitavas = oitavas;
        let quartas = [];
        for (let i=0; i<oitavas.length; i+=2) {
            if (oitavas[i] && oitavas[i+1]) {
                const v1 = simularVencedor(oitavas[i].timeA, oitavas[i].timeB);
                const v2 = simularVencedor(oitavas[i+1].timeA, oitavas[i+1].timeB);
                quartas.push({ timeA: v1, timeB: v2, resultado: null });
            }
        }
        mataMata.quartas = quartas;
        let semi = [];
        for (let i=0; i<quartas.length; i+=2) {
            if (quartas[i] && quartas[i+1]) {
                semi.push({ timeA: simularVencedor(quartas[i].timeA, quartas[i].timeB), timeB: simularVencedor(quartas[i+1].timeA, quartas[i+1].timeB), resultado: null });
            }
        }
        mataMata.semi = semi;
        if (semi.length >= 2) {
            const finalistaA = simularVencedor(semi[0].timeA, semi[0].timeB);
            const finalistaB = simularVencedor(semi[1].timeA, semi[1].timeB);
            mataMata.final = { timeA: finalistaA, timeB: finalistaB, resultado: null };
        } else { mataMata.final = null; }
    }

    function renderEliminatorias() {
        const renderMatch = (match, isFinal = false) => {
            if (!match) return `<div class="match-card">A definir</div>`;
            return `<div class="match-card ${isFinal ? 'final-card' : ''}">
                        <div class="match-teams">
                            <div class="team">${match.timeA}</div>
                            <span class="vs-circle">VS</span>
                            <div class="team">${match.timeB}</div>
                        </div>
                        <div class="match-result">⚽ em tempo real</div>
                    </div>`;
        };
        document.getElementById('rodada32').innerHTML = mataMata.r32.length ? mataMata.r32.map(m => renderMatch(m)).join('') : '<div class="match-card">Aguardando classificação</div>';
        document.getElementById('oitavas').innerHTML = mataMata.oitavas.length ? mataMata.oitavas.map(m => renderMatch(m)).join('') : '<div>Confrontos em breve</div>';
        document.getElementById('quartas').innerHTML = mataMata.quartas.length ? mataMata.quartas.map(m => renderMatch(m)).join('') : '<div>—</div>';
        document.getElementById('semifinais').innerHTML = mataMata.semi.length ? mataMata.semi.map(m => renderMatch(m)).join('') : '<div>—</div>';
        document.getElementById('final').innerHTML = mataMata.final ? renderMatch(mataMata.final, true) : '<div class="match-card final-card">🏆 Aguarde definição</div>';
    }

    async function fullSync() {
        const statusDiv = document.getElementById('statusMsg');
        statusDiv.innerHTML = '🟡 Buscando dados atualizados no GE...';
        const resultado = await fetchPlacaresGE();
        if (resultado.ok) {
            statusDiv.innerHTML = `✅ Sincronizado! (${resultado.alterados} jogos atualizados) - ${new Date().toLocaleTimeString()}`;
        } else {
            statusDiv.innerHTML = `⚠️ Modo offline/simulado (GE bloqueado). Usando estatísticas internas.`;
        }
        // recalc mata-mata com novos resultados
        const novaR32 = gerarChaveCompleta();
        mataMata.r32 = novaR32;
        avancarFases();
        renderGrupos();
        renderEliminatorias();
    }

    // --------------------------------------------------
    // Sistema de abas interativo
    // --------------------------------------------------
    function initTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        const panes = {
            'grupos': document.getElementById('painel-grupos'),
            'r32': document.getElementById('painel-r32'),
            'oitavas': document.getElementById('painel-oitavas'),
            'quartas': document.getElementById('painel-quartas'),
            'semi': document.getElementById('painel-semi'),
            'final': document.getElementById('painel-final')
        };
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                Object.values(panes).forEach(pane => pane.classList.remove('active-pane'));
                if (panes[tabId]) panes[tabId].classList.add('active-pane');
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }

    // auto toggle
    let autoInterval = null;
    let autoEnabled = true;
    function setupAutoRefresh() {
        const btnAuto = document.getElementById('btnAuto');
        if (autoInterval) clearInterval(autoInterval);
        if (autoEnabled) {
            autoInterval = setInterval(() => fullSync(), 55000);
            btnAuto.innerHTML = '⏱️ AUTO (ON)';
            btnAuto.style.background = '#009c3b';
        } else {
            btnAuto.innerHTML = '⏸️ AUTO (OFF)';
            btnAuto.style.background = '#6c2e2e';
        }
        btnAuto.onclick = () => {
            autoEnabled = !autoEnabled;
            setupAutoRefresh();
        };
    }

    document.getElementById('btnRefresh').addEventListener('click', () => fullSync());
    
    // inicialização completa
    async function start() {
        initTabs();
        const r32Inicial = gerarChaveCompleta();
        mataMata.r32 = r32Inicial;
        avancarFases();
        renderGrupos();
        renderEliminatorias();
        await fullSync(); // primeira carga
        setupAutoRefresh();
    }
    start();
</script>
</body>
